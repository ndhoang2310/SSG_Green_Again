<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="riverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c8a8a"/>
      <stop offset="30%" stop-color="#4a7a8a"/>
      <stop offset="70%" stop-color="#4a7a8a"/>
      <stop offset="100%" stop-color="#5c8a8a"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b8955a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1000" height="800" fill="#f5f0e8"/>

  <!-- ====== RỪNG CÂY (top, visual background) ====== -->
  <rect x="0" y="0" width="1000" height="120" fill="#2e7d32" rx="0"/>
  <text x="500" y="45" text-anchor="middle" fill="#c8e6c9" font-size="14" font-weight="bold" font-family="Arial">RỪNG CÂY (Visual Background — không vào được)</text>
  <!-- Tree silhouettes -->
  <g fill="#1b5e20" opacity="0.6">
    <polygon points="80,25 95,110 65,110"/><polygon points="95,40 110,110 80,110"/>
    <polygon points="180,20 195,115 165,115"/><polygon points="195,35 210,115 180,115"/>
    <polygon points="300,30 312,115 288,115"/><polygon points="312,42 324,115 300,115"/>
    <polygon points="420,22 435,115 405,115"/><polygon points="435,38 450,115 420,115"/>
    <polygon points="560,25 575,115 545,115"/><polygon points="575,40 590,115 560,115"/>
    <polygon points="700,28 715,115 685,115"/><polygon points="715,42 730,115 700,115"/>
    <polygon points="840,22 855,115 825,115"/><polygon points="855,38 870,115 840,115"/>
    <polygon points="920,30 935,115 905,115"/>
  </g>

  <!-- Tree planting spots -->
  <g>
    <rect x="60" y="90" width="90" height="35" fill="#6d4c41" rx="4" opacity="0.7"/>
    <text x="105" y="113" text-anchor="middle" fill="#fff" font-size="9" font-family="Arial">🌱 Đất trồng cây</text>
    <rect x="820" y="85" width="90" height="35" fill="#6d4c41" rx="4" opacity="0.7"/>
    <text x="865" y="108" text-anchor="middle" fill="#fff" font-size="9" font-family="Arial">🌱 Đất trồng cây</text>
  </g>

  <!-- ====== ZONE DIVIDERS ====== -->
  <!-- Vertical line between Residential and Park -->
  <line x1="415" y1="120" x2="415" y2="600" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ====== KHU DÂN CƯ (left, rows 2-3) ====== -->
  <rect x="0" y="120" width="415" height="280" fill="#f5ebe0" stroke="#d7ccc8" stroke-width="1.5" rx="2"/>
  <text x="207" y="143" text-anchor="middle" fill="#5d4037" font-size="15" font-weight="bold" font-family="Arial">🏘️ KHU DÂN CƯ</text>
  <text x="207" y="162" text-anchor="middle" fill="#8d6e63" font-size="10" font-family="Arial">PL ban đầu: 60 | Spawn: 2-3 món / 3 phút</text>

  <!-- NPC Cô Tư + Shop -->
  <rect x="130" y="195" width="130" height="70" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" rx="3" filter="url(#softShadow)"/>
  <text x="195" y="215" text-anchor="middle" fill="#e65100" font-size="10" font-weight="bold" font-family="Arial">Tiệm tạp hóa</text>
  <text x="195" y="232" text-anchor="middle" fill="#bf360c" font-size="11" font-family="Arial">👩 Cô Tư (Unaware)</text>
  <text x="195" y="248" text-anchor="middle" fill="#999" font-size="8" font-family="Arial">Xả rác theo thói quen</text>

  <!-- Houses -->
  <rect x="30" y="200" width="65" height="55" fill="#fff" stroke="#bdbdbd" stroke-width="1" rx="2"/>
  <polygon points="30,200 62,178 95,200" fill="#ef5350"/>
  <rect x="275" y="210" width="65" height="50" fill="#fff" stroke="#bdbdbd" stroke-width="1" rx="2"/>
  <polygon points="275,210 307,190 340,210" fill="#42a5f5"/>

  <!-- Hotspot marker -->
  <rect x="30" y="320" width="160" height="28" fill="#ff9800" rx="4" opacity="0.85"/>
  <text x="110" y="339" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="Arial">🟠 HOTSPOT: Residential Street</text>

  <!-- Rác icon -->
  <g opacity="0.5">
    <circle cx="60" cy="370" r="4" fill="#8d6e63"/>
    <rect x="140" y="367" width="12" height="7" fill="#ffcc80" rx="1"/>
    <circle cx="250" cy="372" r="3" fill="#a1887f"/>
  </g>

  <!-- Sóc area -->
  <text x="290" y="385" text-anchor="middle" fill="#6d4c41" font-size="10" font-family="Arial">🐿️ Sóc (C4)</text>

  <!-- ====== CÔNG VIÊN / KHU PICNIC (right, rows 2-3) ====== -->
  <rect x="415" y="120" width="585" height="280" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" rx="2"/>
  <text x="707" y="143" text-anchor="middle" fill="#2e7d32" font-size="15" font-weight="bold" font-family="Arial">🌳 CÔNG VIÊN / KHU PICNIC</text>
  <text x="707" y="162" text-anchor="middle" fill="#66bb6a" font-size="10" font-family="Arial">PL ban đầu: 55 | Spawn: 3-4 món / 4 phút</text>

  <!-- Cối xay gió (Landmark) -->
  <rect x="870" y="180" width="50" height="90" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5" rx="2"/>
  <text x="895" y="205" text-anchor="middle" fill="#5d4037" font-size="8" font-family="Arial">Cối xay</text>
  <text x="895" y="218" text-anchor="middle" fill="#5d4037" font-size="8" font-family="Arial">gió cũ</text>
  <!-- Windmill blades -->
  <g transform="translate(895, 185)">
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#8d6e63" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#8d6e63" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#8d6e63" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#8d6e63" stroke-width="2"/>
  </g>
  <text x="895" y="285" text-anchor="middle" fill="#a1887f" font-size="7" font-family="Arial">Landmark</text>
  <text x="895" y="295" text-anchor="middle" fill="#a1887f" font-size="7" font-family="Arial">toàn map</text>

  <!-- Picnic area -->
  <rect x="510" y="195" width="140" height="70" fill="#fff9c4" stroke="#fdd835" stroke-width="1.5" rx="3" filter="url(#softShadow)"/>
  <text x="580" y="215" text-anchor="middle" fill="#f57f17" font-size="10" font-weight="bold" font-family="Arial">Thảm picnic</text>
  <text x="580" y="232" text-anchor="middle" fill="#e65100" font-size="10" font-family="Arial">🧑 Anh Tùng (Unaware)</text>
  <text x="580" y="248" text-anchor="middle" fill="#999" font-size="8" font-family="Arial">"Sẽ có người dọn"</text>

  <!-- Bé Na -->
  <text x="690" y="330" text-anchor="middle" fill="#e91e63" font-size="10" font-family="Arial">👧 Bé Na (gần cây)</text>

  <!-- Trees in park -->
  <g fill="#4caf50">
    <ellipse cx="670" cy="260" rx="22" ry="18" fill="#388e3c"/>
    <rect x="667" y="270" width="6" height="15" fill="#795548"/>
    <ellipse cx="750" cy="250" rx="20" ry="16" fill="#43a047"/>
    <rect x="747" y="258" width="6" height="15" fill="#795548"/>
  </g>

  <!-- Chim -->
  <text x="685" y="285" text-anchor="middle" fill="#ff9800" font-size="10" font-family="Arial">🐦 Chim (C4)</text>

  <!-- Hotspot marker -->
  <rect x="510" y="330" width="160" height="28" fill="#ff9800" rx="4" opacity="0.85"/>
  <text x="590" y="349" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="Arial">🟠 HOTSPOT: Picnic Area</text>

  <!-- Rác in park -->
  <g opacity="0.4">
    <rect x="555" y="370" width="10" height="6" fill="#90a4ae" rx="1"/>
    <circle cx="630" cy="372" r="3" fill="#a5d6a7"/>
    <rect x="700" y="367" width="14" height="6" fill="#ce93d8" rx="1"/>
  </g>

  <!-- ====== HÀNG 3: Square | RC | Riverside ====== -->

